# configs/train_config.yaml

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # Separate roots for train and val (DFC 2025 folder structure)
  root_dir:        "data/bright"   # ← train folder
  pre_event_dir:   "pre-event"
  post_event_dir:  "post-event"
  target_dir:      "target"

  # Contest-provided split files
  split_file_dir:  "data/bright/splits"
  train_split:     "train_set.txt"       # ← stems inside train/
  val_split:       "val_set.txt"         # ← stems inside val/
  test_split:      "test_set.txt"

  num_classes:     4
  tile_size:       512

  optical_mean:    [91.19, 87.18, 78.86]
  optical_std:     [52.42, 45.44, 41.69]
  sar_mean:        [57.1922]
  sar_std:         [37.6639]

  class_weights:       [0.1, 1.0, 3.0, 5.0]
  severe_damage_boost: 2.0


# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  horizontal_flip_p:           0.5
  vertical_flip_p:             0.5
  rotate_90_p:                 0.5
  random_brightness_contrast_p: 0.3
  gaussian_noise_p:            0.2
  elastic_transform_p:         0.2
  coarse_dropout_p:            0.2


# ── Model ─────────────────────────────────────────────────────────────────────
model:
  backbone:         "resnet34"   # encoder backbone
  pretrained:       true         # ImageNet pretrained weights
  fusion_mode:      "concat_diff" # concat | diff | concat_diff
  use_attention:    true         # SE channel + spatial attention gates
  encoder_channels: [64, 64, 128, 256, 512]  # ResNet-34 skip levels
  decoder_channels: [256, 128, 64, 32]


# ── Loss ─────────────────────────────────────────────────────────────────────
loss:
  focal_weight:     0.5          # weight for FocalLoss
  dice_weight:      0.5          # weight for DiceLoss
  focal_gamma:      2.0          # focusing parameter
  focal_alpha:      null         # set to class_weights to use weighted focal


# ── Training ─────────────────────────────────────────────────────────────────
training:
  epochs:           50
  batch_size:       8
  num_workers:      4
  precision:        "16-mixed"   # AMP — use "32" if you get NaN losses

  # Optimizer
  optimizer:        "adamw"
  learning_rate:    1.0e-4
  weight_decay:     1.0e-4

  # Scheduler — cosine annealing
  scheduler:        "cosine"
  warmup_epochs:    3
  min_lr:           1.0e-6

  # Early stopping
  patience:         10           # stop if val IoU doesn't improve for 10 epochs
  monitor:          "val/mean_iou"
  monitor_mode:     "max"

  # Checkpointing
  checkpoint_dir:   "checkpoints"
  save_top_k:       3            # keep best 3 checkpoints


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  project:          "disaster-damage-assessment"
  run_name:         "siamese-unet-resnet34"
  log_every_n_steps: 10