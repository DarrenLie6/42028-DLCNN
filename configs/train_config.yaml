# configs/train_config.yaml

data:
  root_dir: "data/bright"
  pre_event_dir: "pre-event"
  post_event_dir: "post-event"
  target_dir: "target"
  split_file_dir: "data/bright/splits"
  train_split: "train_set.txt"
  val_split: "val_set.txt"
  test_split: "test_set.txt"
  num_classes: 4
  tile_size: 256
  optical_mean: [0.358, 0.342, 0.309]
  optical_std: [0.206, 0.178, 0.163]
  sar_mean: [0.2243]
  sar_std: [0.1477]

augmentation:
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.5
  rotate_90_p: 0.5
  random_brightness_contrast_p: 0.3
  # gaussian_noise_p: 0.2 
  elastic_transform_p: 0.2
  coarse_dropout_p: 0.2

model:
  dropout_p: 0.1

training:
  epochs: 200
  batch_size: 8
  num_workers:  4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-3
  min_lr: 1.0e-6
  patience: 15
  checkpoint_dir: "checkpoints"